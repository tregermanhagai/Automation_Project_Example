[pytest]
markers =
    api: API-level tests (use -m api to run only these)
    ui: UI-level tests (use -m ui to run only these)
    mobile: Tests that run on mobile devices (use -m mobile to run only these)
    critical: Critical tests that must always pass (use -m critical to run only these)
    logout: Tests related to user logout functionality (use -m logout to run only these)
    api_sanity: API sanity tests (use -m api_sanity to run only these)
    smoke: Smoke tests that cover basic functionality (use -m smoke to run only these)
    system: System-level tests that cover end-to-end scenarios (use -m system to run only these)
    error_handling: Tests that verify error handling and validation (use -m error_handling to run only these)
    api_sanity_negative: Negative API sanity tests (use -m api_sanity_negative to run only these)
